name: Update News

on:
  schedule:
    # Кожні 12 годин: о 6:00 і 18:00 UTC
    - cron: '0 6,18 * * *'
  # Дозволяє запустити вручну з GitHub UI
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # щоб пушити JSON назад у репо

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --prefix scripts

      - name: Run news update
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/updateNews.js

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          # Пушимо тільки якщо є зміни
          git diff --staged --quiet || git commit -m "chore: update news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
